# Harness config for the `glm` plugin — copy to ~/.codex-glm/config.toml
# GLM-5.2 served by Ollama Cloud. Get an API key at
# https://ollama.com/settings/keys and export OLLAMA_API_KEY.
#
# model_context_window: codex cannot send Ollama's num_ctx over the OpenAI
# wire; Ollama Cloud runs cloud models at their full advertised window
# server-side. This key tells codex the window is 1M (GLM-5.2's advertised
# size) so it budgets correctly and does not compact the conversation
# prematurely.
model = "glm-5.2"
model_context_window = 1000000
model_provider = "ollama-cloud"

[model_providers.ollama-cloud]
name = "Ollama Cloud"
base_url = "https://ollama.com/v1"
env_key = "OLLAMA_API_KEY"
wire_api = "responses"
requires_openai_auth = false
